<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPAS 淨零碳 刷題系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #22c55e;
    --green-dim: #166534;
    --red: #ef4444;
    --red-dim: #7f1d1d;
    --yellow: #eab308;
    --bg: #0a0f0d;
    --surface: #111916;
    --surface2: #1a2420;
    --border: #2a3f35;
    --text: #e8f5ef;
    --text2: #8aab97;
    --accent: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 22px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--green);
    letter-spacing: 3px;
  }
  .stats-bar {
    display: flex;
    gap: 36px;
    font-size: 14px;
    color: var(--text2);
  }
  .stats-bar span { font-family: 'Space Mono', monospace; }
  .stat-val { color: var(--text); font-weight: 700; }

  /* FILTER BAR */
  .filter-bar {
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .filter-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--green); color: var(--green); }
  .filter-btn.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* QUESTION PANEL */
  .q-panel {
    flex: 1;
    padding: 56px 72px;
    max-width: 860px;
  }
  .q-meta {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 32px;
  }
  .q-num-badge {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 4px;
  }
  .q-tag-badge {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .q-text {
    font-size: 20px;
    line-height: 1.9;
    margin-bottom: 40px;
    color: var(--text);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 24px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-size: 16px;
    line-height: 1.7;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--green); background: #0d1f17; }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected { border-color: var(--yellow); background: #1a1500; }
  .option-btn.correct { border-color: var(--green); background: #0d2015; }
  .option-btn.wrong { border-color: var(--red); background: #1a0d0d; }
  .opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text2);
    min-width: 24px;
    padding-top: 2px;
  }
  .option-btn.correct .opt-label { color: var(--green); }
  .option-btn.wrong .opt-label { color: var(--red); }
  .opt-icon { margin-left: auto; font-size: 18px; min-width: 22px; }

  /* EXPLANATION */
  .explanation {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--green);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 36px;
    font-size: 15px;
    line-height: 1.9;
    color: var(--text2);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation.wrong-exp { border-left-color: var(--red); }
  .explanation strong { color: var(--text); }
  .explanation .exp-title {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--green);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .explanation.wrong-exp .exp-title { color: var(--red); }

  /* NAV BUTTONS */
  .nav-btns {
    display: flex;
    gap: 14px;
  }
  .btn {
    padding: 14px 32px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--green); color: #000; }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--green); color: var(--green); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* SIDEBAR - QUESTION MAP */
  .sidebar {
    width: 320px;
    border-left: 1px solid var(--border);
    padding: 32px 24px;
    overflow-y: auto;
    background: var(--surface);
  }
  .sidebar-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text2);
    letter-spacing: 2px;
    margin-bottom: 18px;
  }
  .q-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .q-dot {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.1s;
  }
  .q-dot:hover { border-color: var(--green); }
  .q-dot.current { border-color: var(--yellow); color: var(--yellow); }
  .q-dot.correct { background: #0d2015; border-color: var(--green); color: var(--green); }
  .q-dot.wrong { background: #1a0d0d; border-color: var(--red); color: var(--red); }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* SCORE SCREEN */
  .score-screen {
    display: none;
    flex: 1;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
    padding: 60px;
  }
  .score-screen.show { display: flex; }
  .score-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid var(--green);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
  }
  .score-num { font-size: 52px; font-weight: 700; color: var(--green); }
  .score-label { font-size: 13px; color: var(--text2); }
  .score-detail { font-size: 16px; color: var(--text2); text-align: center; line-height: 2.2; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .q-panel { padding: 32px 28px; }
    .stats-bar { gap: 16px; }
    header { padding: 18px 24px; }
    .filter-bar { padding: 14px 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">iPAS // 淨零碳 刷題</div>
  <div class="stats-bar">
    <span>答對 <span class="stat-val" id="hdr-correct">0</span></span>
    <span>答錯 <span class="stat-val" id="hdr-wrong">0</span></span>
    <span>正確率 <span class="stat-val" id="hdr-rate">—</span></span>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all')">全部（155題）</button>
  <button class="filter-btn" onclick="setFilter('科1')">考科1模擬題</button>
  <button class="filter-btn" onclick="setFilter('COP歷程')">COP歷程</button>
  <button class="filter-btn" onclick="setFilter('專有名詞')">專有名詞</button>
  <button class="filter-btn" onclick="setFilter('CDP/SBTi/RE100')">CDP/SBTi/RE100</button>
  <button class="filter-btn" onclick="setFilter('GRI/TCFD')">GRI/TCFD</button>
  <button class="filter-btn" onclick="setFilter('CBAM詳細')">CBAM</button>
  <button class="filter-btn" onclick="setFilter('台灣淨零')">台灣淨零</button>
  <button class="filter-btn" onclick="setFilter('碳定價制度')">碳定價</button>
  <button class="filter-btn" onclick="setFilter('ISO14068')">ISO 14068</button>
  <button class="filter-btn" onclick="setFilter('盤查原則')">盤查原則</button>
  <button class="filter-btn" onclick="setFilter('邊界')">邊界設定</button>
  <button class="filter-btn" onclick="setFilter('量化')">量化計算</button>
  <button class="filter-btn" onclick="setFilter('碳足跡')">碳足跡CFP</button>
  <button class="filter-btn" onclick="setFilter('PCR')">PCR</button>
  <button class="filter-btn" onclick="setFilter('LCA')">LCA</button>
  <button class="filter-btn" onclick="setFilter('wrong')">❌ 錯題</button>
  <button class="filter-btn" onclick="shuffle()">🔀 隨機順序</button>
</div>

<div class="main" id="main-area">
  <!-- QUIZ PANEL -->
  <div class="q-panel" id="quiz-panel">
    <div class="q-meta">
      <div class="q-num-badge" id="q-num-badge">Q 1 / 80</div>
      <div class="q-tag-badge" id="q-tag-badge">考科1</div>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title" id="exp-title">✓ 解析</div>
      <div id="exp-content"></div>
    </div>
    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="prevQ()">← 上一題</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextQ()">下一題 →</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="progress-wrap">
      <div class="progress-label">
        <span>進度</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="sidebar-title">題目列表</div>
    <div class="q-grid" id="q-grid"></div>
    <button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="resetAll()">重新開始</button>
  </div>
</div>

<!-- SCORE SCREEN -->
<div class="score-screen" id="score-screen">
  <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--text2)">完成測驗</div>
  <div class="score-circle">
    <div class="score-num" id="score-num">0%</div>
    <div class="score-label">正確率</div>
  </div>
  <div class="score-detail" id="score-detail"></div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-primary" onclick="resetAll()">再做一次</button>
    <button class="btn btn-secondary" onclick="setFilter('wrong')">複習錯題</button>
  </div>
</div>

<script>
// ==================== ALL QUESTIONS ====================
const ALL_QUESTIONS = [
  // ===== 考科1：淨零碳規劃管理基礎概論（模擬樣題）=====
  {
    id: 1, tag: '科1',
    q: '哪一項不是推動抵換類型計畫的好處？',
    opts: ['增加全球二氧化碳的總量','刺激低碳技術的發展','為減碳提供經濟誘因','幫助國家達到他們的排放目標'],
    ans: 0,
    exp: '碳抵換（Carbon Offset）的設計邏輯是「總量中性」——A地排放、B地減少，全球CO₂淨排放不增加。若說抵換會「增加」CO₂總量，根本違反抵換設計的核心目的，故 A 為錯誤敘述（即「不是好處」）。B、C、D 均為抵換計畫的實際效益。'
  },
  {
    id: 2, tag: '科1',
    q: '哪一項不是環境部認可的減量政策工具？',
    opts: ['碳費','總量管制排放交易','用國際自願碳權抵免碳費','環評增量抵換'],
    ans: 2,
    exp: '台灣環境部認可的工具包含：碳費、總量管制排放交易（ETS）、環評增量抵換。但「國際自願碳市場（VCR）的碳權」屬於企業自願購買，不具備抵免台灣碳費的法律效力，故 C 不是環境部認可的工具。'
  },
  {
    id: 3, tag: '科1',
    q: '導入 ISO 14068-1 的碳中和應用無法達到哪個效益？',
    opts: ['量化及減少溫室氣體排放','提升聲譽與風險管控','經由抵換達到碳中和可以符合歐盟CBAM的抵減碳關稅','鑑別效率不佳領域，改善整體表現，進行成本管控'],
    ans: 2,
    exp: 'CBAM（碳邊境調整機制）看的是實際生產過程的排放量，不承認企業透過碳中和宣告來折抵碳關稅義務。ISO 14068-1 的碳中和與 CBAM 是兩套完全不同的制度，無法互相抵換，故 C 是錯誤敘述。'
  },
  {
    id: 4, tag: '科1',
    q: 'SBTi認證審核項目中，展現企圖心（Ambition）是以應符合幾°C的情境為其減碳目標？',
    opts: ['0.5°C','1.0°C','1.5°C','2°C'],
    ans: 2,
    exp: 'SBTi（科學基礎減量目標倡議）審核「企圖心（Ambition）」時，要求企業設定的減碳目標必須符合將全球升溫控制在 1.5°C 以內的情境。2°C 是舊標準，SBTi 現已全面升級為 1.5°C 要求。'
  },
  {
    id: 5, tag: '科1',
    q: '哪一項不是歐盟碳邊境調整機制（CBAM）管制的產品對象？',
    opts: ['氫','肥料','鋼鐵','塑膠'],
    ans: 3,
    exp: '歐盟CBAM目前列管：鋼鐵、鋁、水泥、肥料、電力、氫。塑膠目前尚未納入列管清單（未來可能納入），故 D 塑膠是正確答案（不是CBAM管制對象）。'
  },
  {
    id: 6, tag: '科1',
    q: '下列哪一項不是巴黎協定第二條所列的目標？',
    opts: ['追求2050年淨零排放','限制全球溫升低於工業化前水準2°C以下，追求1.5°C以內','以不威脅糧食生產的方式增強氣候韌性，使溫室氣體朝低排放發展','使資金流向符合溫室氣體低排放路徑'],
    ans: 0,
    exp: '巴黎協定第2條列出三個目標：(1)溫升控制2°C/追求1.5°C、(2)不威脅糧食生產的調適、(3)資金流向低排放路徑。「追求2050年淨零排放」並非第2條的明文目標，淨零是各國自訂NDC的方向，故 A 為錯誤敘述。'
  },
  {
    id: 7, tag: '科1',
    q: '我國永續報告書編製申報及公司治理3.0所使用的應參考標準，何者為非？',
    opts: ['全球申報準則（GRI）','碳揭露專案（CDP）','氣候風險財務揭露（TCFD）','永續會計準則委員會（SASB）'],
    ans: 1,
    exp: '台灣公司治理3.0要求永續報告書應參考：GRI、TCFD、SASB。CDP（碳揭露計畫）是企業自願填報的問卷揭露平台，屬於揭露管道而非報告書編製標準，故 B 為非。'
  },
  {
    id: 8, tag: '科1',
    q: '下列有關能源轉型的論述何者為非？',
    opts: ['有韌性的能源系統應注重環境永續性、可負擔性與能源安全','核能是一種再生能源','參加氣候俱樂部不等於免除CBAM義務','推動循環經濟可以提高總物質效率化使用'],
    ans: 1,
    exp: '核能是低碳能源，但不是再生能源。再生能源定義為「來自自然界可持續補充的能源」（太陽、風、水等）。核燃料（鈾）是有限資源，故不屬再生能源。這是常見考試陷阱，故 B 為錯誤敘述。'
  },
  {
    id: 9, tag: '科1',
    q: '歐盟進口商對於CBAM憑證抵免可以使用何者出口商的抵免證明？',
    opts: ['貨物稅','營業稅','自願碳市場減量額度','外顯碳價（碳稅費/排放交易）'],
    ans: 3,
    exp: '歐盟CBAM允許進口商若能證明出口國已對該產品徵收「外顯碳價（Explicit Carbon Price）」——即官方強制的碳稅或ETS排放交易——則可申請抵減CBAM憑證數量。貨物稅、營業稅、自願碳市場碳權均不被CBAM承認。'
  },
  {
    id: 10, tag: '科1',
    q: '歐盟CBAM排放量計算的概念何者為是？',
    opts: ['應計算至全生命週期的排放量','以生產總重量（含包裝與廢料）來計算重量','與ISO 14064-1不同，外界輸入熱源要計入直接排放','廢棄物的處理也要計算排放'],
    ans: 2,
    exp: 'CBAM的計算邏輯：只算生產階段（非全生命週期）；重量以出售產品淨重計算（不含包裝廢料）；廢棄物處理不計入。正確的是 C：與ISO 14064-1不同，CBAM將外購熱能/蒸汽納入直接排放計算，ISO 14064-1則歸為間接排放。'
  },
  {
    id: 11, tag: '科1',
    q: '碳稅費與排放交易之間的觀念，何者為非？',
    opts: ['排放交易為強制性市場，應設定排放上限','排放交易制度得在主管機關的授權下使用認可的減量額度進行超額排放量扣抵','只要是排放交易市場，涵蓋的部門別都一致','企業的總體碳成本可以包含法遵管制成本、內部碳定價成本與間接碳成本'],
    ans: 2,
    exp: '各國ETS涵蓋的產業範圍差異很大：歐盟ETS涵蓋電力、工業、航空；台灣碳費聚焦大型排放源。「只要是排放交易市場，部門別都一致」完全錯誤，故 C 為非。A、B、D 均為正確敘述。'
  },
  {

// ==================== STATE ====================
let currentFilter = 'all';
let filteredQs = [];
let currentIdx = 0;
let answers = {}; // idx -> chosen option index
let correctSet = new Set();
let wrongSet = new Set();

function getFilteredQuestions() {
  if (currentFilter === 'all') return [...ALL_QUESTIONS];
  if (currentFilter === 'wrong') {
    const wrongIds = [...wrongSet];
    return ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
  }
  return ALL_QUESTIONS.filter(q => q.tag === currentFilter);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  filteredQs = getFilteredQuestions();
  currentIdx = 0;
  answers = {};
  renderSidebar();
  renderQuestion();
  updateScoreScreen(false);
}

function shuffle() {
  filteredQs = getFilteredQuestions().sort(() => Math.random() - 0.5);
  currentIdx = 0;
  answers = {};
  renderSidebar();
  renderQuestion();
  updateScoreScreen(false);
}

function resetAll() {
  answers = {};
  correctSet = new Set();
  wrongSet = new Set();
  currentIdx = 0;
  filteredQs = getFilteredQuestions();
  updateScoreScreen(false);
  renderSidebar();
  renderQuestion();
  updateHeader();
}

// ==================== RENDER ====================
function renderQuestion() {
  if (filteredQs.length === 0) {
    document.getElementById('q-text').textContent = '沒有符合條件的題目';
    document.getElementById('options').innerHTML = '';
    document.getElementById('explanation').classList.remove('show');
    return;
  }
  const q = filteredQs[currentIdx];
  document.getElementById('q-num-badge').textContent = `Q ${currentIdx + 1} / ${filteredQs.length}`;
  document.getElementById('q-tag-badge').textContent = q.tag;
  document.getElementById('q-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const labels = ['A','B','C','D'];
  const answered = answers.hasOwnProperty(currentIdx);

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (answered) {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      else if (i === answers[currentIdx] && answers[currentIdx] !== q.ans) btn.classList.add('wrong');
    }
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span style="flex:1">${opt}</span>${answered && i === q.ans ? '<span class="opt-icon">✓</span>' : (answered && i === answers[currentIdx] && answers[currentIdx] !== q.ans ? '<span class="opt-icon">✗</span>' : '')}`;
    if (!answered) btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  // Explanation
  const expDiv = document.getElementById('explanation');
  if (answered) {
    const correct = answers[currentIdx] === q.ans;
    expDiv.className = 'explanation show' + (correct ? '' : ' wrong-exp');
    document.getElementById('exp-title').textContent = correct ? '✓ 解析' : '✗ 錯了！解析如下';
    document.getElementById('exp-content').innerHTML = `<strong>正確答案：${labels[q.ans]}（${q.opts[q.ans]}）</strong><br><br>${q.exp}`;
  } else {
    expDiv.className = 'explanation';
  }

  // Next button
  const nextBtn = document.getElementById('next-btn');
  if (currentIdx === filteredQs.length - 1) {
    nextBtn.textContent = '完成測驗';
    nextBtn.onclick = showScore;
  } else {
    nextBtn.textContent = '下一題 →';
    nextBtn.onclick = nextQ;
  }

  updateProgress();
  updateDots();
}

function selectAnswer(i) {
  const q = filteredQs[currentIdx];
  answers[currentIdx] = i;
  if (i === q.ans) correctSet.add(q.id);
  else { wrongSet.add(q.id); correctSet.delete(q.id); }
  updateHeader();
  renderQuestion();
}

function nextQ() {
  if (currentIdx < filteredQs.length - 1) { currentIdx++; renderQuestion(); }
}
function prevQ() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = filteredQs.length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = total ? `${(answered/total)*100}%` : '0%';
}

function renderSidebar() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  filteredQs.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = i + 1;
    if (i === currentIdx) dot.classList.add('current');
    if (answers.hasOwnProperty(i)) {
      dot.classList.add(answers[i] === q.ans ? 'correct' : 'wrong');
    }
    dot.onclick = () => { currentIdx = i; renderQuestion(); updateDots(); };
    grid.appendChild(dot);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('current', i === currentIdx);
  });
}

function updateHeader() {
  const c = correctSet.size;
  const w = wrongSet.size;
  const total = c + w;
  document.getElementById('hdr-correct').textContent = c;
  document.getElementById('hdr-wrong').textContent = w;
  document.getElementById('hdr-rate').textContent = total > 0 ? Math.round(c/total*100) + '%' : '—';
}

function showScore() {
  const total = filteredQs.length;
  const answered = Object.keys(answers).length;
  let correct = 0;
  filteredQs.forEach((q, i) => {
    if (answers.hasOwnProperty(i) && answers[i] === q.ans) correct++;
  });
  document.getElementById('score-num').textContent = answered > 0 ? Math.round(correct/answered*100) + '%' : '0%';
  document.getElementById('score-detail').innerHTML = `答對 ${correct} 題 / 共答 ${answered} 題（共 ${total} 題）<br>錯題數：${wrongSet.size} 題`;
  updateScoreScreen(true);
}

function updateScoreScreen(show) {
  document.getElementById('score-screen').style.display = show ? 'flex' : 'none';
  document.getElementById('main-area').style.display = show ? 'none' : 'flex';
}

// ==================== INIT ====================
filteredQs = getFilteredQuestions();
renderSidebar();
renderQuestion();
</script>
</body>
</html>
